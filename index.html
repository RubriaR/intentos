<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria - Intentos</title>
    <style>
        /* CONFIGURACIÓN GENERAL */
        * { box-sizing: border-box; }
        body { 
            background-color: #000000; 
            color: #eeeeee; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        #canvas { 
            flex: 1; 
            position: relative; 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto; 
            background: #050505; 
        }

        /* TÍTULOS GLOBALES */
        #main-header {
            position: absolute;
            top: 20px;
            left: 30px;
            z-index: 50;
            pointer-events: none;
        }
        #main-title {
            margin: 0;
            font-size: 28px;
            color: #fff;
            letter-spacing: 2px;
        }
        #sub-title {
            margin: 5px 0 0 0;
            font-size: 16px;
            color: #888;
            font-weight: normal;
        }

        /* TÍTULOS DE FASE CENTRADOS */
        .phase-title-center {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            color: #fff;
            z-index: 50;
            font-weight: bold;
            letter-spacing: 1px;
            pointer-events: none;
        }

        .scene { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: none; 
            flex-direction: column; 
        }
        .scene.active { display: flex; }

        /* ESCENA 2 - SKYPE */
        #scene-2-bg { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-image: url('./skype.png'); 
            background-position: center center; 
            background-repeat: no-repeat; 
            background-size: cover; 
            background-color: #222; 
            transition: opacity 8s ease, filter 8s ease; 
            z-index: 1; 
        }
        .skype-chat-panel { 
            position: absolute; 
            right: 20px; 
            top: 80px; 
            bottom: 80px; 
            width: 320px; 
            background: rgba(255, 255, 255, 0.9); 
            color: #333; 
            border-radius: 8px; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            z-index: 2; 
            font-family: Arial, sans-serif; 
            font-size: 13px; 
            overflow: hidden; 
        }
        .chat-history { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            padding-top: 10px; 
        }
        .chat-bubble { 
            background: #e1f5fe; 
            color: #0288d1; 
            padding: 8px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            transition: opacity 1s ease; 
        }
        .skype-time { 
            font-size: 10px; 
            color: #6bb9f0; 
            font-weight: bold; 
            margin-bottom: 4px; 
        }

        /* PANTALLAS DIVIDIDAS Y FLUJO RESPONSIVO */
        .split-screen { 
            display: flex; 
            width: 100%; 
            height: 100%; 
            background: #000; 
        }
        .side { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            min-width: 0;
            position: relative; 
        }

        .center-stream { 
            flex: 1.8;
            max-width: 550px; 
            height: 100%; 
            padding: 20vh 20px 20px 20px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
        }
        .dialogue-line { 
            margin-top: 8px; 
            line-height: 1.4; 
            font-size: 14.5px; 
            transition: opacity 1s ease; 
        } 
        
        .line-rubria { color: #5bc0be; font-weight: bold; }
        .line-mom { color: #c1a58e; }
        .line-system { color: #e74c3c; font-style: italic; font-size: 13px; text-align: center; margin-top: 15px; }

        /* INSTRUCCIONES FLOTANTES */
        .click-prompt { 
            position: absolute; 
            bottom: 75px; 
            left: 50%; 
            transform: translateX(-50%); 
            color: #fff; 
            padding: 6px 15px; 
            border-radius: 20px; 
            font-size: 12px; 
            pointer-events: none; 
            animation: pulse 2s infinite; 
            font-family: Arial, sans-serif; 
            z-index: 10; 
            display: none; 
            text-align: center;
            background: rgba(0,0,0,0.6);
        }

        /* NUEVO: BOTÓN DE REINICIO FASE 5 */
        .restart-prompt {
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            color: #5bc0be; 
            padding: 8px 20px; 
            border-radius: 20px; 
            font-size: 13px; 
            cursor: pointer; 
            font-family: Arial, sans-serif; 
            z-index: 20; 
            display: none; 
            text-align: center;
            background: rgba(255,255,255,0.1);
            border: 1px solid #5bc0be;
            transition: background 0.3s ease;
        }
        .restart-prompt:hover {
            background: rgba(91, 192, 190, 0.2);
        }

        /* CAJITA DE WHATSAPP (AHORA FASE 3) */
        .wa-input-box {
            position: absolute;
            bottom: 12%; 
            width: 70%;
            max-width: 280px;
            height: 38px; 
            background-color: #ffffff;
            border-radius: 20px;
            padding: 10px 15px;
            color: #000;
            font-family: Arial, sans-serif;
            font-size: 13px;
            line-height: 1.3;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            cursor: text;
            z-index: 5;
            white-space: nowrap; 
            overflow: hidden;    
        }
        #wa-text-stream { display: inline-block; }
        .fade-to-black { transition: opacity 4s ease; opacity: 1; }

        /* PIE DE PÁGINA */
        #footer { 
            height: 60px; 
            background: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 0 30px; 
            font-family: Arial, sans-serif; 
            border-top: 1px solid #333; 
            z-index: 20; 
            position: relative; 
        }
        .copyright { position: absolute; left: 30px; color: #888; font-size: 13px; }
        .nav-links a { 
            color: #888; text-decoration: none; margin: 0 8px; font-weight: bold; font-size: 16px; padding: 5px; transition: all 0.3s; 
        }
        .nav-links a:hover { color: #fff; }
        .nav-links a.active { color: #5bc0be; border-bottom: 2px solid #5bc0be; }
        .nav-disabled { opacity: 0.2; pointer-events: none; }
        
        #link-conversacion { margin-left: 20px; font-weight: normal; } /* Estilo extra para diferenciar el enlace nuevo */

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 0.9; } 100% { opacity: 0.4; } }
        
        .silhouette { max-width: 95%; max-height: 75vh; object-fit: contain; opacity: 0.85; border-radius: 8px; transition: all 0.5s ease; }

        @media (max-width: 768px) {
            .split-screen { flex-direction: column; }
            .side { flex: 1; padding: 10px; height: auto; }
            .center-stream { flex: 2; max-width: 100%; padding: 15px; height: auto; justify-content: center; }
            .silhouette { max-height: 32vh; max-width: 85%; }
            .skype-chat-panel { width: calc(100% - 40px); left: 20px; top: 40px; bottom: 40px; }
            .copyright { display: none; }
            .phone-view { flex-direction: row !important; }
            .phone-view .side { flex: 1; }
            .phone-view .silhouette { max-height: 70vh; max-width: 95%; }
            .wa-input-box { font-size: 11px; padding: 6px 10px; bottom: 14%; width: 80%; }
            #main-header { left: 15px; top: 15px; }
            #main-title { font-size: 20px; }
            .phase-title-center { top: 50px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="main-header">
        <h1 id="main-title">Memoria</h1>
        <h2 id="sub-title">Intentos</h2>
    </div>

    <div id="canvas">
        <div id="prompt" class="click-prompt">(Haz clic para iniciar o avanzar)</div>
        <div id="restart-prompt" class="restart-prompt" onclick="goToScene(1)">(Haz clic para iniciar de nuevo)</div>

        <div id="scene-1" class="scene active" onclick="advanceScene1()">
            <div class="phase-title-center">Una llamada</div> 
            <div class="split-screen">
                <div class="side">
                    <img src="yop1.png" class="silhouette" alt="Rubria">
                </div>
                <div id="chat-stream-1" class="center-stream"></div>
                <div class="side">
                    <img src="mami1.png" class="silhouette" alt="Mamá">
                </div>
            </div>
        </div>

        <div id="scene-2" class="scene" onclick="advanceScene2()">
            <div id="scene-2-bg"></div> 
            <div class="skype-chat-panel" onclick="event.stopPropagation();"> 
                <div style="font-weight:bold; border-bottom:1px solid #eee; padding-bottom:5px; margin-bottom:8px;">Conversación de chat</div>
                <div id="skype-chat-history" class="chat-history"></div>
            </div>
        </div>

        <div id="scene-3" class="scene" onclick="advanceScene3()">
            <div class="split-screen phone-view">
                <div class="side fade-to-black" id="rubria-side-3">
                    <img src="celrub.png" id="rubria-img-3" class="silhouette" alt="Celular Rubria">
                    <div class="wa-input-box" id="wa-input-container">
                        <span id="wa-text-stream"></span>
                    </div>
                </div>
                <div class="side">
                    <img src="celchacho.png" id="chacho-img-3" class="silhouette" alt="Celular Chacho">
                </div>
            </div>
        </div>

        <div id="scene-4" class="scene" onclick="advanceScene4()">
            <div class="phase-title-center">Otra llamada</div> 
            <div class="split-screen">
                <div id="rubria-side-4" class="side">
                    <img src="yop2.png" class="silhouette" alt="Rubria"> 
                </div>
                <div id="chat-stream-4" class="center-stream"></div>
                <div id="mom-side-4" class="side">
                    <div id="mom-avatar-box-4">
                        <img src="mami1.png" id="mom-img-4" class="silhouette" alt="Mamá">
                    </div>
                </div>
            </div>
        </div>

        <div id="scene-5" class="scene" onclick="advanceScene5()">
            <div class="split-screen phone-view">
                <div class="side" style="background-color: #000000;"></div>
                <div class="side">
                    <img src="celchacho3.png" class="silhouette" alt="Celular Chacho 3">
                </div>
            </div>
        </div>

    </div>

    <div id="footer">
        <div class="copyright">&copy; Rubria Rocha de Luna, 2026</div>
        <div class="nav-links">
            <a href="#" id="nav-1" onclick="goToScene(1)" class="active">1</a>
            <a href="#" id="nav-2" onclick="goToScene(2)">2</a>
            <a href="#" id="nav-3" onclick="goToScene(3)">3</a>
            <a href="#" id="nav-4" onclick="goToScene(4)">4</a>
            <a href="#" id="nav-5" onclick="goToScene(5)">5</a>
            
            <a href="https://sites.google.com/view/migrarte/conversaci%C3%B3n?authuser=0" id="link-conversacion">Conversación</a>
        </div>
    </div>

    <audio id="audio-corte" src="corte.wav"></audio>
    <audio id="audio-ocupado" src="ocupado.flac"></audio>
    <audio id="audio-marcado" src="marcado.wav"></audio>
    <audio id="audio-skype" src="skyperingtone.mp3"></audio>

    <script>
        let isTyping = false;
        let activeTimeouts = [];
        const promptEl = document.getElementById('prompt');
        const restartEl = document.getElementById('restart-prompt'); /* NUEVO: Variable para el botón de reinicio */

        function safeTimeout(fn, delay) {
            const t = setTimeout(fn, delay);
            activeTimeouts.push(t);
            return t;
        }

        function fadeOldLines(streamId, maxLines, isSkype = false) {
            const stream = document.getElementById(streamId);
            if (!stream) return;
            let selector = isSkype ? '.chat-bubble' : '.dialogue-line';
            let lines = stream.querySelectorAll(selector);
            
            if (lines.length > maxLines) {
                stream.removeChild(lines[0]);
                lines = stream.querySelectorAll(selector);
            }

            lines.forEach((line, index) => {
                let reverseIndex = lines.length - 1 - index; 
                if (reverseIndex === 0) line.style.opacity = '1';
                else if (reverseIndex === 1) line.style.opacity = '1';
                else if (reverseIndex === 2) line.style.opacity = '0.7';
                else if (reverseIndex === 3) line.style.opacity = '0.4';
                else if (reverseIndex === 4) line.style.opacity = '0.15';
                else line.style.opacity = '0'; 
            });
        }

        function typeText(targetElement, text, speed, callback, streamId, isSkype) {
            let i = 0;
            function worker() {
                if (i < text.length) {
                    targetElement.innerHTML += text.charAt(i);
                    if (targetElement.parentElement && targetElement.parentElement.classList.contains('wa-input-box')) {
                        targetElement.parentElement.scrollLeft = targetElement.parentElement.scrollWidth;
                    }
                    i++;
                    safeTimeout(worker, speed);
                } else if (callback) {
                    callback();
                }
            }
            worker();
        }

        function playSound(id) {
            const audio = document.getElementById(id);
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Audio pendiente de interacción", e));
            }
        }

        function stopSound(id) {
            const audio = document.getElementById(id);
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }
        }

        function stopAllAudios() {
            stopSound('audio-ocupado');
            stopSound('audio-corte');
            stopSound('audio-marcado');
            stopSound('audio-skype');
        }

        function goToScene(sceneNum) {
            if(document.getElementById(`nav-${sceneNum}`) && document.getElementById(`nav-${sceneNum}`).classList.contains('nav-disabled')) return;

            activeTimeouts.forEach(clearTimeout);
            activeTimeouts = [];
            stopAllAudios();

            isTyping = false;
            promptEl.style.display = 'none';
            if (restartEl) restartEl.style.display = 'none'; /* NUEVO: Ocultar botón de reinicio al navegar a otra fase */

            document.querySelectorAll('.scene').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`scene-${sceneNum}`).classList.add('active');
            
            if (document.getElementById(`nav-${sceneNum}`)) {
                document.getElementById(`nav-${sceneNum}`).classList.add('active');
            }

            if(sceneNum === 1) initScene1();
            if(sceneNum === 2) initScene2();
            if(sceneNum === 3) initScene3();
            if(sceneNum === 4) initScene4();
            if(sceneNum === 5) initScene5();
        }

        /* ================= FASE 1: UNA LLAMADA ================= */
        const call1 = [
            { r: "— ¡Hola Mami! ¿Cómo estás? ¿Qué me cuentas?" }, { m: "— ¡Hola! ¿Quién habla?" }, { r: "— Soy yo, Rubria." }, { m: "— Ah hola mijita, ¿qué pasó, dónde estás?" },
            { r: "— Acá en Estados Unidos, acuérdate mami." }, { m: "— Ahhh, sí." }, { r: "— ¿Y te llevaron a consultar mami? ¿Con la doctora?" }, { m: "— Ahhh no sé, no, no creo." },
            { r: "— Es que te iban a llevar para ver si te daban el mismo parche o si te cambiaban el tratamiento." }, { m: "— No, no sé. Aquí está Pepita." },
            { r: "— Ahh sí, me saludas a mi tía... Dile a ver si te pueden conectar por el messenger para verte." }, { m: "— Ah sí, ¿por el qué?" },
            { r: "— Por el messenger. Es que la última vez me conecté y nadie se conectó, me dejaron plantada..." }, { m: "— Ay mijita, pues no sé, aquí estamos esperando a ver si viene este.... este.... mmm este..." },
            { r: "— ¿Erwin?" }, { m: "— sí, a ver si llega." }, { r: "— Ahh que bueno mami, entonces ahorita a lo mejor van a cenar, qué rico." }, { m: "— Bueno pues entonces hablamos luego mijita, ándale." },
            { r: "— Pero si apenas empezamos a platicar mami…" }, { m: "— Ándale sí... bueno pues entonces hablamos después. Adiós." }, { r: "— Bueno, adiós. Te llamo la próxima semana." },
            { sys: "[ Sonido de corte de llamada ]" }
        ];
        let step1 = 0;
        function initScene1() { step1 = 0; document.getElementById('chat-stream-1').innerHTML = ''; promptEl.textContent = "(Haz clic para iniciar o avanzar)"; promptEl.style.display = 'block'; }
        function advanceScene1() {
            if (isTyping) return; promptEl.style.display = 'none'; const stream = document.getElementById('chat-stream-1');
            if (step1 < call1.length) {
                isTyping = true; const line = call1[step1]; const p = document.createElement('div'); p.classList.add('dialogue-line'); stream.appendChild(p); fadeOldLines('chat-stream-1', 7);
                if (line.r) { p.classList.add('line-rubria'); typeText(p, line.r, 15, () => { isTyping = false; step1++; }, 'chat-stream-1', false); }
                else if (line.m) { p.classList.add('line-mom'); typeText(p, line.m, 15, () => { isTyping = false; step1++; }, 'chat-stream-1', false); }
                else if (line.sys) { p.classList.add('line-system'); if (line.sys.includes("corte")) playSound('audio-corte'); typeText(p, line.sys, 15, () => { isTyping = false; step1++; }, 'chat-stream-1', false); }
            }
        }

        /* ================= FASE 2: SKYPE ================= */
        const skypeMsgs = [
            { time: "4:00 PM", text: "Hola! Ya me conecté, a ver si pueden poner a mi mami frente a la cámara para que me vea..." },
            { time: "4:12 PM", text: "Hola! Ya llevo aquí un ratito, a ver si se conectan. Ya les marqué pero no contesta nadie y en la casa tampoco... bueno aquí sigo..." },
            { time: "4:42 PM", text: "Bueno yo creo que se les pasó que habíamos quedado de vernos por Skype para que me conectaran con mi mami... Bueno pues si pueden por fa, me conecto el siguiente fin de semana, díganme a qué horas pueden ustedes para que conecten a mi mamá..." }
        ];
        let step2 = 0;
        let phase2State = "READY"; 

        function initScene2() {
            step2 = 0; phase2State = "READY";
            document.getElementById('skype-chat-history').innerHTML = ''; 
            document.getElementById('scene-2-bg').style.opacity = "1"; document.getElementById('scene-2-bg').style.filter = "grayscale(0%)";
            promptEl.textContent = "(Haz clic para iniciar o avanzar)"; promptEl.style.display = 'block'; 
            document.querySelectorAll('.nav-links a').forEach(el => { if(el.id !== 'nav-1' && el.id !== 'nav-2' && el.id !== 'link-conversacion') el.classList.add('nav-disabled'); });
        }

        function advanceScene2() {
            if (phase2State !== "READY") return;
            if (step2 >= skypeMsgs.length) return;

            promptEl.style.display = 'none';
            phase2State = "RINGING";
            
            playSound('audio-skype'); 

            safeTimeout(() => {
                stopSound('audio-skype');
                phase2State = "TYPING";
                
                const chatHistory = document.getElementById('skype-chat-history');
                let bubble = document.createElement('div'); bubble.classList.add('chat-bubble');
                let timeStamp = document.createElement('div'); timeStamp.classList.add('skype-time'); timeStamp.textContent = skypeMsgs[step2].time; bubble.appendChild(timeStamp);
                let textContainer = document.createElement('div'); bubble.appendChild(textContainer); chatHistory.appendChild(bubble); 
                fadeOldLines('skype-chat-history', 4, true);

                typeText(textContainer, skypeMsgs[step2].text, 30, () => {
                    const bg = document.getElementById('scene-2-bg');
                    if (step2 === 0) { bg.style.opacity = "0.7"; bg.style.filter = "grayscale(30%)"; }
                    if (step2 === 1) { bg.style.opacity = "0.3"; bg.style.filter = "grayscale(70%) blur(2px)"; }
                    if (step2 === 2) { bg.style.opacity = "0"; } 

                    step2++;

                    if (step2 < skypeMsgs.length) {
                        phase2State = "WAITING";
                        let waitTime = (step2 === 1) ? 6000 : 8000; 
                        safeTimeout(() => {
                            phase2State = "READY";
                            promptEl.style.display = 'block';
                        }, waitTime);
                    } else {
                        phase2State = "DONE";
                        document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('nav-disabled'));
                    }
                }, 'skype-chat-history', true);
            }, 8000); 
        }

        /* ================= FASE 3: WHATSAPP ================= */
        let hasTypedPhase3 = false;
        const phase3Text = "Oye estuve marque y marque, pero no contestaban, me imagino que quizás se quedó sin pila el teléfono o algo. Porfas dile a mi mami que le llamo mañana como a las 4pm de allá. A ver si puedes pasármela por fis.";
        
        function initScene3() {
            hasTypedPhase3 = false; document.getElementById('wa-text-stream').innerHTML = '';
            document.getElementById('rubria-img-3').src = "celrub.png"; document.getElementById('wa-input-container').style.display = 'flex';
            document.getElementById('chacho-img-3').src = "celchacho.png"; document.getElementById('rubria-side-3').style.opacity = '1';
            promptEl.textContent = "(Haz clic para iniciar o avanzar)"; promptEl.style.display = 'block';
            document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('nav-disabled'));
        }
        
        function advanceScene3() {
            if (hasTypedPhase3) return;
            hasTypedPhase3 = true; promptEl.style.display = 'none';
            document.querySelectorAll('.nav-links a').forEach(el => { if(el.id !== 'nav-3' && el.id !== 'link-conversacion') el.classList.add('nav-disabled'); });

            typeText(document.getElementById('wa-text-stream'), phase3Text, 50, () => {
                document.getElementById('wa-input-container').style.display = 'none';
                document.getElementById('rubria-img-3').src = "celrub2.png";
                document.getElementById('chacho-img-3').src = "celchacho2.png";

                safeTimeout(() => {
                    document.getElementById('rubria-side-3').style.opacity = '0';
                    safeTimeout(() => {
                        document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('nav-disabled'));
                    }, 4400); 
                }, 5000); 
            });
        }

        /* ================= FASE 4: OTRA LLAMADA ================= */
        const call2 = [
            { r: "— Hola mami, ¿cómo estás?" }, { m: "— Bien." }, { sys: "[ Silencio... ]" }, { r: "— Soy yo, Rubria, tu hija." }, { sys: "[ Silencio... ]" },
            { r: "— Te mandé unas fotos con mi primo, ¿las viste? es donde vivo, ahí se ven los pinos enormes." }, { m: "— Ahhh mira, no sé." },
            { r: "— Mami, ya estoy dando clases en la universidad, ¿qué te parece? ¿estás contenta por mí?" }, { m: "— Ahhh sí, pues sí. ¿Dónde estás?" },
            { r: "— En Estados Unidos mami... Está muy bonito todo por acá, a ver si te puedo traer pronto conmigo..." }, { sys: "[ click... queda descolgado el teléfono. ]" },
            { r: "— ¿Mami?, ¿Mami? mmm creo que dejaste descolgado el teléfono..." }, { sys: "[ A lo lejos se oye que habla la mamá ]" },
            { r: "— ¿Mami? ¿estás ahí? ¡¡¡MAMI!!! ¡¡¡aquí estoy en el teléfono!!!" }, { sys: "[ click... se cortó la llamada. ]" }
        ];
        let step4 = 0, redialAttempts = 0;

        function initScene4() {
            step4 = 0; redialAttempts = 0; document.getElementById('chat-stream-4').innerHTML = '';
            document.getElementById('rubria-side-4').style.opacity = "1"; document.getElementById('mom-img-4').src = "mami1.png"; 
            document.getElementById('mom-avatar-box-4').style.display = 'block'; promptEl.textContent = "(Haz clic para iniciar o avanzar)"; promptEl.style.display = 'block';
        }

        function advanceScene4() {
            if (isTyping) return;
            promptEl.style.display = 'none'; const stream = document.getElementById('chat-stream-4');

            if (step4 < call2.length) {
                isTyping = true; const line = call2[step4]; const p = document.createElement('div'); p.classList.add('dialogue-line'); stream.appendChild(p);
                fadeOldLines('chat-stream-4', 7);

                if (line.r) { p.classList.add('line-rubria'); typeText(p, line.r, 15, () => { isTyping = false; step4++; }, 'chat-stream-4', false); }
                else if (line.m) { p.classList.add('line-mom'); typeText(p, line.m, 15, () => { isTyping = false; step4++; }, 'chat-stream-4', false); }
                else if (line.sys) { 
                    p.classList.add('line-system'); 
                    if (line.sys.includes("Se corta") || line.sys.includes("descolgado") || line.sys.includes("se cortó")) { document.getElementById('mom-img-4').src = "mami2.png"; playSound('audio-corte'); }
                    
                    typeText(p, line.sys, 15, () => { 
                        isTyping = false; 
                        step4++; 
                        if (step4 === call2.length) promptEl.style.display = 'block';
                    }, 'chat-stream-4', false); 
                }
            } else if (redialAttempts < 8) {
                isTyping = true; redialAttempts++; 
                stopSound('audio-ocupado'); 
                
                const pDial = document.createElement('div'); pDial.classList.add('dialogue-line', 'line-system');
                pDial.textContent = `[ Marca de nuevo... ]`; stream.appendChild(pDial); fadeOldLines('chat-stream-4', 7);

                playSound('audio-marcado');

                safeTimeout(() => {
                    stopSound('audio-marcado'); 
                    const pBusy = document.createElement('div'); pBusy.classList.add('dialogue-line', 'line-system'); 
                    pBusy.textContent = `[ Suena ocupado ]`; stream.appendChild(pBusy); 
                    
                    fadeOldLines('chat-stream-4', 7); 
                    playSound('audio-ocupado');
                    
                    document.getElementById('rubria-side-4').style.opacity = (1 - (redialAttempts * 0.12)).toString();
                    document.getElementById('mom-img-4').src = "mami2.png"; 
                    isTyping = false;

                    if (redialAttempts < 8) { promptEl.style.display = 'block'; } 
                    else {
                        document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('nav-disabled'));
                        promptEl.style.display = 'block';
                    }
                }, 3000);
            } else {
                stopSound('audio-ocupado');
            }
        }

        /* ================= FASE 5: CELULAR FINAL ================= */
        function initScene5() { 
            promptEl.style.display = 'none'; 
            
            /* NUEVO: Mostrar el botón de reinicio unos segundos después de entrar a esta fase */
            safeTimeout(() => {
                if (restartEl) restartEl.style.display = 'block';
            }, 3000);
        } 
        function advanceScene5() {}

        // Arrancar en la fase 1 por defecto
        initScene1();

    </script>
</body>
</html>
